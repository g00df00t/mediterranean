<body class="text-emerald-950">
<div class="max-w-[480px] mx-auto min-h-screen relative">

  <!-- HEADER -->
  <header class="sticky top-0 z-20 bg-gradient-to-br from-brand-700 to-brand-600 text-white px-5 pt-safe pb-5 rounded-b-3xl shadow-lift">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-white/15 flex items-center justify-center text-2xl backdrop-blur shrink-0">🫒</div>
      <div class="min-w-0">
        <h1 class="font-display text-[19px] leading-tight font-600">Pat's Mediterranean Bistro</h1>
        <p class="text-[12.5px] text-brand-100/90 font-500 mt-0.5">Easy weeknight dinners · for 1–2</p>
      </div>
    </div>
  </header>

  <main class="px-4 pt-5 pb-28">
    <!-- PLAN -->
    <section id="view-plan" class="view active">
      <div class="grid grid-cols-3 gap-2.5 mb-5">
        <div class="bg-white rounded-2xl p-3 text-center shadow-soft">
          <div id="stat-planned" class="text-2xl font-800 text-brand-600 leading-none">0</div>
          <div class="text-[10px] uppercase tracking-wide text-emerald-900/45 font-600 mt-1.5">Dinners</div>
        </div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-soft">
          <div id="stat-time" class="text-2xl font-800 text-brand-600 leading-none">0</div>
          <div class="text-[10px] uppercase tracking-wide text-emerald-900/45 font-600 mt-1.5">Avg min</div>
        </div>
        <div class="bg-white rounded-2xl p-3 text-center shadow-soft">
          <div id="stat-items" class="text-2xl font-800 text-brand-600 leading-none">0</div>
          <div class="text-[10px] uppercase tracking-wide text-emerald-900/45 font-600 mt-1.5">To buy</div>
        </div>
      </div>
      <div class="flex items-center justify-between mb-3.5">
        <h2 class="font-display text-lg font-600">This Week</h2>
        <div class="flex gap-2">
          <button onclick="surprise()" class="press text-[12.5px] font-600 bg-brand-50 text-brand-700 rounded-xl px-3 py-2">🎲 Fill week</button>
          <button onclick="clearWeek()" class="press text-[12.5px] font-600 bg-orange-50 text-clay rounded-xl px-3 py-2">Clear</button>
        </div>
      </div>
      <div id="days" class="space-y-3"></div>
    </section>

    <!-- RECIPES -->
    <section id="view-recipes" class="view">
      <input id="search" oninput="renderRecipes()" placeholder="Search recipes or ingredients…"
        class="w-full bg-white border border-sand-200 rounded-2xl px-4 py-3 text-[15px] outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-100 mb-3 placeholder:text-emerald-900/35">
      <div id="filters" class="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-1"></div>
      <div id="recipes" class="grid grid-cols-2 gap-3"></div>
    </section>

    <!-- SHOP -->
    <section id="view-shop" class="view">
      <div class="flex items-center justify-between mb-3.5">
        <h2 class="font-display text-lg font-600">Grocery List</h2>
        <button onclick="resetChecks()" class="press text-[12.5px] font-600 bg-brand-50 text-brand-700 rounded-xl px-3 py-2">Reset</button>
      </div>
      <div id="shop"></div>
    </section>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white/90 backdrop-blur-xl border-t border-sand-200 flex pb-safe pt-2 z-30">
    <button id="nav-plan" onclick="show('plan')" class="flex-1 flex flex-col items-center gap-1 text-brand-600 py-1">
      <span class="text-[21px] leading-none">📅</span><span class="text-[10.5px] font-600">Plan</span></button>
    <button id="nav-recipes" onclick="show('recipes')" class="flex-1 flex flex-col items-center gap-1 text-emerald-900/40 py-1">
      <span class="text-[21px] leading-none">🍽️</span><span class="text-[10.5px] font-600">Recipes</span></button>
    <button id="nav-shop" onclick="show('shop')" class="flex-1 flex flex-col items-center gap-1 text-emerald-900/40 py-1 relative">
      <span class="text-[21px] leading-none">🛒</span><span class="text-[10.5px] font-600">Shop</span>
      <span id="shopBadge" class="hidden absolute top-0 right-[28%] bg-clay text-white text-[9px] font-700 min-w-[16px] h-4 rounded-full items-center justify-center px-1">0</span></button>
  </nav>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this)closeModal()" class="hidden fixed inset-0 z-50 bg-emerald-950/40 backdrop-blur-sm items-end justify-center">
  <div id="sheet" class="sheet-anim bg-white w-full max-w-[480px] rounded-t-3xl max-h-[90vh] overflow-y-auto no-scrollbar mb-safe"></div>
</div>

const DOW=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const AISLE_ORDER=["Produce","Meat & Seafood","Dairy & Eggs","Bakery","Pantry","Spices","Frozen"];
const AISLE_ICON={"Produce":"🥬","Meat & Seafood":"🐟","Dairy & Eggs":"🧀","Bakery":"🍞","Pantry":"🥫","Spices":"🧂","Frozen":"❄️"};

/* ============ STATE ============ */
// plan[day] = { id:recipeId, leftover:Boolean }
let plan = normalizePlan(load("medplan_plan", {}));
let checks = load("medplan_checks", {});
let activeFilter = "All";
let hideDone = false;

function normalizePlan(p){const o={};for(const d in p){const v=p[d];if(v==null)continue;o[d]=(typeof v==="number")?{id:v,leftover:false}:v;}return o;}

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch(e){return d;}}
function save(){localStorage.setItem("medplan_plan",JSON.stringify(plan));localStorage.setItem("medplan_checks",JSON.stringify(checks));}
function recipe(id){return RECIPES.find(r=>r.id===id);}

/* ============ NAV ============ */
function show(v){
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  ["plan","recipes","shop"].forEach(n=>{
    const b=document.getElementById("nav-"+n);
    b.classList.toggle("text-brand-600",n===v);
    b.classList.toggle("text-emerald-900/40",n!==v);
  });
  if(v==="shop")renderShop();
  if(v==="recipes")renderRecipes();
  window.scrollTo(0,0);
}

/* ============ PLAN ============ */
function renderPlan(){
  const c=document.getElementById("days");c.innerHTML="";
  const today=new Date();const monday=new Date(today);
  monday.setDate(today.getDate()-((today.getDay()+6)%7));
  DOW.forEach((d,i)=>{
    const date=new Date(monday);date.setDate(monday.getDate()+i);
    const entry=plan[d];const r=entry?recipe(entry.id):null;const lo=entry&&entry.leftover;
    const card=document.createElement("div");
    card.className="bg-white rounded-2xl p-3.5 shadow-soft flex items-center gap-3.5"+(lo?" ring-1 ring-amber-200":"");
    const view=`<button onclick="openRecipe(${r?r.id:0})" class="press w-9 h-9 rounded-xl bg-sand-100 text-brand-700 flex items-center justify-center text-[15px]">👁</button>`;
    const remove=`<button onclick="removeDay('${d}')" class="press w-9 h-9 rounded-xl bg-sand-100 text-emerald-900/50 flex items-center justify-center text-[15px]">✕</button>`;
    const leftoverBtn=`<button onclick="addLeftovers('${d}')" class="press w-9 h-9 rounded-xl bg-amber-100 text-amber-700 flex items-center justify-center text-[15px]" title="Add as leftovers on the next free day">♻</button>`;
    card.innerHTML=`
      <div class="shrink-0 w-12 h-12 rounded-xl ${lo?'bg-amber-50 text-amber-700':'bg-brand-50 text-brand-700'} flex flex-col items-center justify-center leading-none">
        <span class="text-[11px] uppercase tracking-wide font-600">${d}</span>
        <span class="text-[17px] font-700 mt-0.5">${date.getDate()}</span>
      </div>
      <div class="flex-1 min-w-0">
        ${!r?`<div class="text-[14px] text-emerald-900/40 font-500">Tap ＋ to add a dinner</div>`
          :lo?`<div class="text-[14.5px] font-600 truncate text-amber-800">${r.name}</div>
               <div class="text-[12px] text-amber-700/80 mt-0.5 flex items-center gap-1.5"><span class="text-[10px] font-700 px-1.5 py-0.5 rounded-full bg-amber-100">♻ LEFTOVERS</span><span>reheat & serve</span></div>`
          :`<div class="text-[14.5px] font-600 truncate">${r.emoji} ${r.name}</div>
            <div class="text-[12px] text-emerald-900/45 mt-0.5 flex gap-2.5"><span>⏱ ${r.time} min</span><span>${r.tags[0]}</span></div>`}
      </div>
      <div class="flex flex-col gap-1.5 shrink-0">
        ${!r?`<button onclick="openPicker('${d}')" class="press w-9 h-9 rounded-xl bg-brand-600 text-white flex items-center justify-center text-[18px]">＋</button>`
          :lo?view+remove
          :view+leftoverBtn+remove}
      </div>`;
    c.appendChild(card);
  });
  updateStats();
}
function openPicker(d){show("recipes");toast("Pick a recipe for "+d);}
function removeDay(d){delete plan[d];save();renderPlan();updateBadge();}
function assignDay(d,id){plan[d]={id:id,leftover:false};save();renderPlan();}
function addLeftovers(d){
  const entry=plan[d];if(!entry||entry.leftover)return;
  const start=DOW.indexOf(d);
  for(let k=start+1;k<DOW.length;k++){
    if(!plan[DOW[k]]){plan[DOW[k]]={id:entry.id,leftover:true};save();renderPlan();updateBadge();toast("Leftovers added to "+DOW[k]+" ♻");return;}
  }
  toast("No free day left this week for leftovers");
}

function surprise(){
  const quick=RECIPES.filter(r=>r.time<=25);
  const pool=[...quick].sort(()=>Math.random()-0.5);
  DOW.forEach((d,i)=>{plan[d]={id:pool[i%pool.length].id,leftover:false};});
  save();renderPlan();updateBadge();toast("Week filled with quick dinners 🎲");
}
function clearWeek(){plan={};save();renderPlan();updateBadge();toast("Week cleared");}

function updateStats(){
  const entries=Object.values(plan);
  document.getElementById("stat-planned").textContent=entries.length;
  const fresh=entries.filter(e=>!e.leftover);
  const avg=fresh.length?Math.round(fresh.reduce((s,e)=>s+recipe(e.id).time,0)/fresh.length):0;
  document.getElementById("stat-time").textContent=avg;
  document.getElementById("stat-items").textContent=buildList().length;
}

/* ============ RECIPES ============ */
function renderFilters(){
  const tags=["All","Quick","Seafood","Chicken","Vegetarian","One-pan"];
  const c=document.getElementById("filters");c.innerHTML="";
  tags.forEach(t=>{
    const on=activeFilter===t;
    const b=document.createElement("button");
    b.className="press shrink-0 px-3.5 py-2 rounded-full text-[12.5px] font-600 border "+
      (on?"bg-brand-600 border-brand-600 text-white":"bg-white border-sand-200 text-emerald-900/55");
    b.textContent=t;b.onclick=()=>{activeFilter=t;renderRecipes();};
    c.appendChild(b);
  });
}
function renderRecipes(){
  renderFilters();
  const q=(document.getElementById("search").value||"").toLowerCase();
  const c=document.getElementById("recipes");c.innerHTML="";
  let list=RECIPES.filter(r=>{
    const okTag=activeFilter==="All"||r.tags.includes(activeFilter);
    const okQ=!q||r.name.toLowerCase().includes(q)||r.ing.some(i=>i[0].toLowerCase().includes(q));
    return okTag&&okQ;
  });
  if(!list.length){c.innerHTML=`<div class="col-span-2 text-center py-12 text-emerald-900/40"><div class="text-5xl mb-2">🔍</div><p class="text-sm">No recipes match.</p></div>`;return;}
  list.forEach(r=>{
    const quick=r.time<=20;
    const card=document.createElement("div");
    card.className="press bg-white rounded-2xl overflow-hidden shadow-soft flex flex-col cursor-pointer";
    card.onclick=()=>openRecipe(r.id);
    card.innerHTML=`
      <div class="h-[84px] flex items-center justify-center text-[34px] ${r.bg}">${r.emoji}</div>
      <div class="p-2.5 pt-2.5">
        <div class="text-[13px] font-700 leading-tight">${r.name}</div>
        <div class="mt-2 flex items-center gap-1.5 flex-wrap">
          <span class="text-[10px] font-600 px-2 py-0.5 rounded-full ${quick?'bg-amber-100 text-amber-700':'bg-brand-50 text-brand-700'}">⏱ ${r.time}m</span>
          <span class="text-[11px] text-emerald-900/40">${r.tags[0]}</span>
        </div>
      </div>`;
    c.appendChild(card);
  });
}

/* ============ RECIPE MODAL ============ */
function openRecipe(id){
  const r=recipe(id);
  const dayButtons=DOW.map(d=>`<button onclick="assignFromModal('${d}',${id})" class="press flex-1 min-w-[28%] bg-brand-50 text-brand-700 rounded-xl py-2.5 text-[12.5px] font-700">${d}</button>`).join("");
  document.getElementById("sheet").innerHTML=`
    <div class="h-[120px] flex items-center justify-center text-[54px] relative ${r.bg}">${r.emoji}
      <button onclick="closeModal()" class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/85 text-emerald-950 flex items-center justify-center text-[17px]">✕</button>
    </div>
    <div class="p-5">
      <h2 class="font-display text-[22px] font-600 leading-tight mb-2">${r.name}</h2>
      <div class="flex gap-1.5 flex-wrap mb-4">
        <span class="text-[11px] font-600 px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">⏱ ${r.time} min</span>
        ${r.tags.map(t=>`<span class="text-[11px] font-600 px-2.5 py-1 rounded-full bg-brand-50 text-brand-700">${t}</span>`).join("")}
        <span class="text-[11px] font-600 px-2.5 py-1 rounded-full bg-sand-100 text-emerald-900/55">2 servings</span>
      </div>
      <div class="text-[13px] uppercase tracking-wide text-brand-600 font-700 mb-2.5">Add to a day</div>
      <div class="flex flex-wrap gap-2 mb-1">${dayButtons}</div>
      <div class="text-[13px] uppercase tracking-wide text-brand-600 font-700 mt-5 mb-2">Ingredients</div>
      <div>${r.ing.map(i=>`<div class="flex justify-between gap-3 py-2 border-b border-sand-100 text-[14px]"><span>${i[0]}</span><span class="text-emerald-900/45 font-600 shrink-0">${fmtQty(i[1],i[2])}</span></div>`).join("")}</div>
      <div class="text-[13px] uppercase tracking-wide text-brand-600 font-700 mt-5 mb-2.5">Method</div>
      <ol class="list-decimal pl-5 space-y-2.5 text-[14px] marker:text-brand-500 marker:font-700">${r.steps.map(s=>`<li class="pl-1">${s}</li>`).join("")}</ol>
    </div>`;
  const m=document.getElementById("modal");m.classList.remove("hidden");m.classList.add("flex");
}
function assignFromModal(d,id){assignDay(d,id);closeModal();show("plan");toast(recipe(id).name+" → "+d);updateBadge();}
function closeModal(){const m=document.getElementById("modal");m.classList.add("hidden");m.classList.remove("flex");}
function fmtQty(q,u){if(q===""||q==null)return u||"";let n=q%1===0?q:(Math.round(q*100)/100);return (u?`${n} ${u}`:`${n}`).trim();}

/* ============ SHOPPING LIST ============ */
function buildList(){
  const map={};
  Object.values(plan).forEach(entry=>{
    if(entry.leftover)return; // leftovers reuse what you already bought
    recipe(entry.id).ing.forEach(([item,qty,unit,aisle])=>{
      const key=item.toLowerCase()+"|"+(unit||"");
      if(!map[key])map[key]={item,unit:unit||"",aisle,qty:0,count:0,numeric:typeof qty==="number"};
      if(typeof qty==="number")map[key].qty+=qty; else map[key].numeric=false;
      map[key].count++;
    });
  });
  return Object.entries(map).map(([key,v])=>({key,...v}));
}
function renderShop(){
  const items=buildList();const c=document.getElementById("shop");
  if(!items.length){
    c.innerHTML=`<div class="text-center py-12 text-emerald-900/45">
      <div class="text-5xl mb-3">🛒</div>
      <p class="text-sm mb-4">No dinners planned yet.<br>Add some on the Plan tab and your<br>grocery list builds itself.</p>
      <button onclick="show('plan')" class="press bg-brand-600 text-white rounded-xl px-4 py-2.5 text-[13.5px] font-600">Go to Plan</button></div>`;
    return;
  }
  const total=items.length, got=items.filter(i=>checks[i.key]).length, pct=total?Math.round(got/total*100):0;
  c.innerHTML="";
  const prog=document.createElement("div");
  prog.className="bg-white rounded-2xl p-4 shadow-soft mb-3.5";
  prog.innerHTML=`<div class="flex justify-between items-baseline mb-2.5">
      <span class="text-[13px] font-700">🛒 ${got} of ${total} in the cart</span>
      <span class="text-[12px] text-emerald-900/45 font-600">${pct}%</span></div>
    <div class="h-2.5 bg-brand-50 rounded-full overflow-hidden"><div class="bar-fill h-full bg-gradient-to-r from-brand-500 to-brand-700 rounded-full" style="width:${pct}%"></div></div>`;
  c.appendChild(prog);
  const tog=document.createElement("div");tog.className="flex gap-2 mb-4";
  tog.innerHTML=`
    <button onclick="setHide(false)" class="press flex-1 py-2 rounded-full text-[12.5px] font-600 border ${hideDone?'bg-white border-sand-200 text-emerald-900/55':'bg-brand-600 border-brand-600 text-white'}">Show all</button>
    <button onclick="setHide(true)" class="press flex-1 py-2 rounded-full text-[12.5px] font-600 border ${hideDone?'bg-brand-600 border-brand-600 text-white':'bg-white border-sand-200 text-emerald-900/55'}">Hide what's in cart</button>`;
  c.appendChild(tog);
  AISLE_ORDER.forEach(aisle=>{
    let group=items.filter(i=>i.aisle===aisle).sort((a,b)=>a.item.localeCompare(b.item));
    if(hideDone)group=group.filter(i=>!checks[i.key]);
    if(!group.length)return;
    const g=document.createElement("div");g.className="mb-5";
    g.innerHTML=`<h3 class="text-[12px] uppercase tracking-wide text-brand-700/70 font-700 mb-2 flex items-center gap-2">${AISLE_ICON[aisle]||"•"} ${aisle}</h3>`;
    group.forEach(i=>{
      const done=!!checks[i.key];
      const qtyTxt=i.numeric?fmtQty(i.qty,i.unit):(i.count>1?`×${i.count}`:"");
      const el=document.createElement("div");
      el.className="press bg-white rounded-xl px-3.5 py-3 mb-2 flex items-center gap-3 shadow-soft cursor-pointer";
      el.onclick=()=>toggleCheck(i.key);
      el.innerHTML=`
        <div class="w-6 h-6 rounded-lg flex items-center justify-center text-white text-[14px] shrink-0 border-2 ${done?'bg-brand-600 border-brand-600':'border-sand-200'}">${done?"✓":""}</div>
        <div class="flex-1 text-[14px] font-600 ${done?'line-through text-emerald-900/40':''}">${i.item}</div>
        <div class="text-[12.5px] text-emerald-900/45 font-600">${qtyTxt}</div>`;
      g.appendChild(el);
    });
    c.appendChild(g);
  });
}
function toggleCheck(key){checks[key]=!checks[key];save();renderShop();updateBadge();}
function setHide(v){hideDone=v;renderShop();}
function resetChecks(){checks={};save();renderShop();toast("Checks reset");}

/* ============ MISC ============ */
function updateBadge(){
  const n=buildList().filter(i=>!checks[i.key]).length;
  const b=document.getElementById("shopBadge");
  if(n>0){b.classList.remove("hidden");b.classList.add("flex");b.textContent=n;}
  else{b.classList.add("hidden");b.classList.remove("flex");}
}
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;
  t.classList.remove("opacity-0");t.classList.add("opacity-100","-translate-y-1");
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.classList.add("opacity-0");t.classList.remove("opacity-100","-translate-y-1");},1900);
}

/* ============ INIT ============ */
renderPlan();renderRecipes();updateBadge();
</script>
<script>
/* register service worker for offline use */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
</script>
